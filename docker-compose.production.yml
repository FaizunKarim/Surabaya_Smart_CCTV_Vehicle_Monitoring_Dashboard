version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: surabaya-postgres
    environment:
      POSTGRES_DB: surabaya_cctv
      POSTGRES_USER: surabaya
      POSTGRES_PASSWORD: surabaya
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U surabaya -d surabaya_cctv"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: surabaya-backend-api
    command: ["/bin/bash", "/app/start-api.sh"]
    environment:
      FRONTEND_ORIGIN: http://localhost:3000
      PUBLIC_API_BASE_URL: http://localhost:8080
      DATABASE_URL: postgresql+asyncpg://surabaya:surabaya@postgres:5432/surabaya_cctv
      ENABLE_AI_PIPELINE: "false"
      RUN_EMBEDDED_VISION_WORKER: "false"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5

  vision-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: surabaya-vision-worker
    command: ["/bin/bash", "/app/start-worker.sh"]
    environment:
      DATABASE_URL: postgresql+asyncpg://surabaya:surabaya@postgres:5432/surabaya_cctv
      ENABLE_AI_PIPELINE: "true"
      RUN_EMBEDDED_VISION_WORKER: "false"
      VISION_MAX_CAMERAS_PER_CYCLE: "4"
      VISION_SAMPLE_EVERY_N_FRAMES: "12"
      VISION_FRAMES_PER_CAMERA: "60"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: surabaya-nginx
    depends_on:
      backend-api:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./backend/infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
